name: CI (CPU)

on:
  pull_request:
    branches: ['**']

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    name: CPU Tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Build & Test (GPU stub)
        run: |
          cargo test --lib --features gpu-stub
          cargo check --examples --features gpu-stub
